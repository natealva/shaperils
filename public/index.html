<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shaperils — Rally the Crew to Shays</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍺</text></svg>">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap');

    :root {
      --bg: #0f0f13;
      --surface: #1a1a24;
      --surface-hover: #22222f;
      --border: #2a2a3a;
      --amber: #f59e0b;
      --amber-glow: rgba(245, 158, 11, 0.15);
      --amber-dark: #b45309;
      --green: #22c55e;
      --green-glow: rgba(34, 197, 94, 0.15);
      --blue: #3b82f6;
      --purple: #a855f7;
      --red: #ef4444;
      --text: #e4e4e7;
      --text-muted: #71717a;
      --text-dim: #52525b;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: radial-gradient(ellipse at 30% 20%, rgba(245,158,11,0.04) 0%, transparent 50%),
                  radial-gradient(ellipse at 70% 80%, rgba(59,130,246,0.03) 0%, transparent 50%);
      z-index: -1;
      animation: bgShift 20s ease-in-out infinite alternate;
    }
    @keyframes bgShift { 0%{transform:translate(0,0)} 100%{transform:translate(-5%,-5%)} }

    .container { max-width: 520px; margin: 0 auto; padding: 20px 16px 100px; }

    /* ─── Header ─── */
    .header { text-align: center; padding: 24px 0 16px; }
    .logo {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 2.6rem; font-weight: 700; letter-spacing: -1px;
      background: linear-gradient(135deg, var(--amber), #fbbf24, var(--amber-dark));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .tagline { color: var(--text-muted); font-size: 0.9rem; margin-top: 4px; }
    .month-badge {
      display: inline-block; margin-top: 10px; padding: 4px 12px;
      background: var(--amber-glow); border: 1px solid rgba(245,158,11,0.25);
      border-radius: 20px; font-size: 0.75rem; color: var(--amber);
      font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase;
    }

    /* ─── User bar ─── */
    .user-bar {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 10px 16px; margin-bottom: 12px;
    }
    .user-bar .greeting { font-size: 0.85rem; color: var(--text-muted); }
    .user-bar .greeting strong { color: var(--amber); }
    .user-bar .logout-btn {
      background: none; border: none; color: var(--text-dim); cursor: pointer;
      font-size: 0.8rem; padding: 4px 8px;
    }
    .user-bar .logout-btn:hover { color: var(--red); }

    /* ─── Cards ─── */
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 20px; margin-bottom: 14px;
    }
    .card-title {
      font-family: 'Space Grotesk', sans-serif; font-size: 1.1rem;
      font-weight: 600; margin-bottom: 14px;
      display: flex; align-items: center; gap: 8px;
    }

    /* ─── Bottom Nav ─── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--surface); border-top: 1px solid var(--border);
      display: flex; justify-content: center; gap: 0;
      padding: 0; z-index: 100;
      max-width: 520px; margin: 0 auto;
    }
    @supports (padding-bottom: env(safe-area-inset-bottom)) {
      .bottom-nav { padding-bottom: env(safe-area-inset-bottom); }
    }
    .nav-btn {
      flex: 1; padding: 10px 4px 8px; border: none; background: none;
      color: var(--text-dim); cursor: pointer; display: flex;
      flex-direction: column; align-items: center; gap: 2px;
      font-family: 'Inter', sans-serif; font-size: 0.65rem; font-weight: 500;
      transition: color 0.2s;
    }
    .nav-btn .nav-icon { font-size: 1.3rem; }
    .nav-btn.active { color: var(--amber); }
    .nav-btn:hover { color: var(--text); }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* ─── Forms ─── */
    .form-group { margin-bottom: 12px; }
    .form-group label {
      display: block; font-size: 0.75rem; font-weight: 500;
      color: var(--text-muted); margin-bottom: 5px;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    input[type="text"], input[type="tel"] {
      width: 100%; padding: 11px 14px; background: var(--bg);
      border: 1px solid var(--border); border-radius: 10px;
      color: var(--text); font-family: 'Inter', sans-serif;
      font-size: 0.95rem; outline: none; transition: border-color 0.2s;
    }
    input:focus { border-color: var(--amber); box-shadow: 0 0 0 3px var(--amber-glow); }
    input::placeholder { color: var(--text-dim); }

    /* ─── Buttons ─── */
    .btn {
      width: 100%; padding: 13px 18px; border: none; border-radius: 12px;
      font-family: 'Inter', sans-serif; font-size: 0.95rem; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary {
      background: linear-gradient(135deg, var(--amber), var(--amber-dark)); color: #000;
    }
    .btn-primary:hover:not(:disabled) { box-shadow: 0 4px 20px rgba(245,158,11,0.35); }
    .btn-green {
      background: linear-gradient(135deg, var(--green), #16a34a); color: #000;
    }
    .btn-green:hover:not(:disabled) { box-shadow: 0 4px 20px rgba(34,197,94,0.35); }

    /* ─── Message Buttons ─── */
    .msg-btn {
      width: 100%; padding: 14px 16px; border: 1px solid var(--border);
      border-radius: 12px; background: var(--bg); color: var(--text);
      font-family: 'Inter', sans-serif; font-size: 0.88rem; font-weight: 500;
      cursor: pointer; transition: all 0.2s; text-align: left;
      display: flex; align-items: center; gap: 12px; margin-bottom: 8px;
    }
    .msg-btn:hover { background: var(--surface-hover); border-color: var(--amber); }
    .msg-btn:active { transform: scale(0.98); }
    .msg-btn .emoji { font-size: 1.4rem; flex-shrink: 0; }
    .msg-btn .btn-label { font-weight: 600; display: block; }
    .msg-btn .btn-desc { font-size: 0.78rem; color: var(--text-muted); margin-top: 1px; }

    .expandable { display: none; margin-top: 8px; margin-bottom: 8px; padding: 14px;
      background: var(--bg); border: 1px solid var(--border); border-radius: 12px;
      animation: slideDown 0.2s ease; }
    .expandable.visible { display: block; }
    @keyframes slideDown { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
    .expandable .row { display: flex; gap: 8px; }
    .expandable input, .expandable textarea { flex: 1; }
    .expandable textarea {
      width: 100%; padding: 10px 14px; background: var(--surface);
      border: 1px solid var(--border); border-radius: 10px;
      color: var(--text); font-family: 'Inter', sans-serif;
      font-size: 0.95rem; resize: vertical; min-height: 70px; outline: none;
      margin-bottom: 8px;
    }
    .expandable .btn { width: auto; padding: 11px 18px; flex-shrink: 0; }

    /* ─── Selfie / Camera ─── */
    .camera-area {
      position: relative; width: 100%; aspect-ratio: 1;
      background: #000; border-radius: 16px; overflow: hidden;
      margin-bottom: 14px; display: flex; align-items: center;
      justify-content: center;
    }
    .camera-area video, .camera-area img {
      width: 100%; height: 100%; object-fit: cover;
    }
    .camera-area canvas { display: none; }
    .camera-placeholder {
      color: var(--text-dim); text-align: center; padding: 40px;
    }
    .camera-placeholder .cam-icon { font-size: 3rem; margin-bottom: 8px; }
    .camera-controls { display: flex; gap: 8px; }
    .camera-controls .btn { flex: 1; }

    .checkin-status {
      text-align: center; padding: 20px; background: var(--green-glow);
      border: 1px solid rgba(34,197,94,0.3); border-radius: 12px;
      margin-bottom: 14px;
    }
    .checkin-status .big-check { font-size: 2.5rem; }
    .checkin-status .status-text { color: var(--green); font-weight: 600; margin-top: 4px; }

    /* ─── Calendar ─── */
    .cal-grid {
      display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px;
    }
    .cal-header {
      font-size: 0.7rem; font-weight: 600; color: var(--text-dim);
      text-align: center; padding: 4px 0; text-transform: uppercase;
    }
    .cal-day {
      aspect-ratio: 1; border-radius: 10px; display: flex;
      flex-direction: column; align-items: center; justify-content: center;
      font-size: 0.85rem; font-weight: 600; border: 1px solid var(--border);
      background: var(--bg); position: relative; cursor: default;
      transition: all 0.2s;
    }
    .cal-day.future { opacity: 0.4; }
    .cal-day.today { border-color: var(--amber); box-shadow: 0 0 0 2px var(--amber-glow); }
    .cal-day.hit { background: var(--green-glow); border-color: rgba(34,197,94,0.4); color: var(--green); }
    .cal-day.missed { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.3); color: var(--red); }
    .cal-day .day-num { font-size: 0.95rem; }
    .cal-day .day-indicator { font-size: 0.7rem; margin-top: 1px; }
    .cal-day.hit .day-indicator::after { content: '✓'; }
    .cal-day.missed .day-indicator::after { content: '✗'; }

    .cal-user-select {
      margin-bottom: 14px; display: flex; gap: 6px; flex-wrap: wrap;
    }
    .cal-user-btn {
      padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border);
      background: var(--bg); color: var(--text-muted); cursor: pointer;
      font-family: 'Inter', sans-serif; font-size: 0.8rem; font-weight: 500;
      transition: all 0.2s;
    }
    .cal-user-btn.active { background: var(--amber-glow); border-color: var(--amber); color: var(--amber); }

    /* ─── Leaderboard ─── */
    .lb-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 0; border-bottom: 1px solid var(--border);
    }
    .lb-item:last-child { border-bottom: none; }
    .lb-rank {
      font-family: 'Space Grotesk', sans-serif; font-size: 1.3rem;
      font-weight: 700; width: 36px; text-align: center; flex-shrink: 0;
    }
    .lb-rank.gold { color: #fbbf24; }
    .lb-rank.silver { color: #94a3b8; }
    .lb-rank.bronze { color: #d97706; }
    .lb-info { flex: 1; }
    .lb-name { font-weight: 600; font-size: 0.95rem; }
    .lb-stats { font-size: 0.8rem; color: var(--text-muted); margin-top: 2px; }
    .lb-bar-wrap {
      width: 60px; height: 6px; background: var(--bg);
      border-radius: 3px; overflow: hidden; flex-shrink: 0;
    }
    .lb-bar {
      height: 100%; border-radius: 3px;
      background: linear-gradient(90deg, var(--green), var(--amber));
    }

    /* ─── History ─── */
    .history-item { padding: 10px 0; border-bottom: 1px solid var(--border); }
    .history-item:last-child { border-bottom: none; }
    .history-item .msg-text { font-size: 0.88rem; margin-bottom: 3px; }
    .history-item .msg-meta { font-size: 0.73rem; color: var(--text-dim); }
    .empty-state { text-align: center; padding: 24px; color: var(--text-dim); font-size: 0.88rem; }

    /* ─── Toast ─── */
    .toast {
      position: fixed; bottom: 80px; left: 50%;
      transform: translateX(-50%) translateY(100px);
